<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate Holi Surprise 🔥</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HOME -->
  <div id="home" class="section">
    <div class="bounce">🎨</div>
    <h1>Wishing you the happiest Holi filled with love, colors, and laughter!🔥</h1>
    <div class="buttons">
      <button id="yesBtn">Open Surprise 🎁</button>
      <button id="noBtn" class="runBtn">🙈 Nahi Dekhna</button>
    </div>
  </div>

  <!-- CELEBRATION -->
  <div id="celebration" class="section hidden">
    <h1>Holi Haiiiii!!! 🎊</h1>
    <div class="buttons">
      <button id="holiBtn">Chalo Aage 🚀</button>
      <button id="celebrationNoBtn" class="runBtn">🙈 Nahi Dekhna</button>
    </div>
  </div>

  <!-- CHOICE -->
  <div id="choice" class="section hidden">
    <h1>“Agle rang ke surprise ke liye taiyaar ho? 🌸”</h1>
    <div class="buttons">
      <button id="shayariBtn">💫Thoda rang, thoda fun 🎉</button>
      <button id="choiceNoBtn" class="runBtn">🙈 Nahi Dekhna</button>
    </div>
  </div>

  <!-- SHAYARI -->
  <div id="shayari" class="section hidden">
    <div id="typedText"></div>
    <div class="buttons">
      <button onclick="window.location.href='https://it-shubh.github.io/Holi/'">
        🚀 Surprisee 💌
      </button>
      <button id="shayariNoBtn" class="runBtn">🙈 Nahi Dekhna</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
